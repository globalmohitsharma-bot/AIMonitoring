<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="60%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </radialGradient>
    <linearGradient id="fluteG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="25%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#4CAF50"/>
      <stop offset="75%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#9C27B0"/>
    </linearGradient>
  </defs>

  <!-- Blue background circle -->
  <circle cx="100" cy="100" r="99" fill="url(#bg)"/>

  <!-- Crescent highlight (left side, like in original) -->
  <path d="M 18 65 Q 5 100 18 135 Q 30 155 42 155 Q 20 135 18 100 Q 16 65 42 45 Q 30 45 18 65 Z" fill="rgba(255,255,255,0.12)"/>

  <!-- Outer subtle ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Flute (bansuri) — colorful diagonal rod -->
  <line x1="140" y1="92" x2="185" y2="115" stroke="url(#fluteG)" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
  <!-- Flute hole dots -->
  <circle cx="148" cy="96" r="1.8" fill="#FFD700" opacity="0.9"/>
  <circle cx="156" cy="100" r="1.8" fill="#FFD700" opacity="0.9"/>
  <circle cx="164" cy="104" r="1.8" fill="#FFD700" opacity="0.9"/>
  <circle cx="172" cy="108" r="1.8" fill="#FFD700" opacity="0.9"/>

  <!-- Peacock feather (right side) -->
  <!-- Quill -->
  <path d="M 152 58 Q 155 75 158 95 Q 160 108 158 120" stroke="#2E7D32" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Feather barbs left -->
  <path d="M152 58 Q142 52 135 48" stroke="#43A047" stroke-width="1.2" fill="none" opacity="0.85"/>
  <path d="M153 67 Q143 61 136 57" stroke="#26A69A" stroke-width="1" fill="none" opacity="0.75"/>
  <path d="M154 77 Q144 71 137 68" stroke="#1E88E5" stroke-width="1" fill="none" opacity="0.65"/>
  <!-- Feather barbs right -->
  <path d="M152 58 Q162 52 169 50" stroke="#43A047" stroke-width="1.2" fill="none" opacity="0.8"/>
  <path d="M153 67 Q163 61 170 59" stroke="#26A69A" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M154 77 Q164 71 171 69" stroke="#1E88E5" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Eye (outer dark oval) -->
  <ellipse cx="152" cy="56" rx="11" ry="14" fill="#1565C0" opacity="0.7" transform="rotate(-5 152 56)"/>
  <!-- Eye mid (teal) -->
  <ellipse cx="152" cy="56" rx="7" ry="9" fill="#26A69A" opacity="0.85" transform="rotate(-5 152 56)"/>
  <!-- Eye inner (dark blue) -->
  <ellipse cx="152" cy="55" rx="4" ry="5" fill="#0D47A1" opacity="0.9"/>
  <!-- Eye gold dot -->
  <circle cx="152" cy="54" r="2.2" fill="#FFD700" opacity="0.95"/>
  <circle cx="152" cy="54" r="0.9" fill="#fff" opacity="0.7"/>

  <!-- "abc" white italic serif text -->
  <text
    x="30" y="106"
    font-family="Georgia,'Times New Roman',serif"
    font-size="60"
    font-weight="700"
    font-style="italic"
    fill="#ffffff"
    letter-spacing="-2"
    opacity="1"
  >abc</text>

  <!-- Separator line -->
  <line x1="30" y1="118" x2="145" y2="118" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>

  <!-- SHRI AVADH BIHARI -->
  <text x="88" y="133"
    text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="9.5" font-weight="700"
    fill="#ffffff" letter-spacing="1.8" opacity="0.95"
  >SHRI AVADH BIHARI</text>

  <!-- CHARITABLE TRUST -->
  <text x="88" y="147"
    text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="8" font-weight="600"
    fill="rgba(255,255,255,0.85)" letter-spacing="2.2"
  >CHARITABLE TRUST</text>

  <!-- Decorative dots after text (like in logo) -->
  <circle cx="148" cy="133" r="1.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="153" cy="133" r="1.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="158" cy="133" r="1.5" fill="#FFD700" opacity="0.7"/>
</svg>
