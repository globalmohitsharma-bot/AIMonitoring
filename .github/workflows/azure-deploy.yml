name: Deploy to Azure App Service

on:
  push:
    branches: [ master ]
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build React frontend first — outputs to backend/MonitoringApi/wwwroot
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build React frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      # Build and publish .NET app (wwwroot is already populated above)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish .NET app
        run: dotnet publish backend/MonitoringApi/MonitoringApi.csproj --configuration Release --output ./publish

      # Deploy to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
